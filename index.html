    <title>Gabrielle LeChupette</title>
    <style>
        /* CUEVA OSCURA */
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #000;
            display: flex; justify-content: center; align-items: center;
        }

        /* HUECO PARA MIRAR DIBUJO */
        #mask {
            /* Ajuste automático para que quepa en el celu */
            max-width: 100vw;
            max-height: calc(100vw * (640/1048));
            width: 1048px; 
            height: 640px; 
            overflow: hidden;
            position: relative;
            border: 2px solid #111;
            background-color: #000;
            touch-action: none; /* Evita que el celu haga scroll al tocar */
        }

        /* DIBUJO QUE SE MUEVE ATRAS */
        #sprite-layer {
            position: absolute;
            background-image: url('https://i.imgur.com/GN17nyJ.jpeg');
            background-repeat: no-repeat;
            background-size: 700% 600%; /* Proporción basada en 7x6 frames */
            width: 700%; 
            height: 600%;
            image-rendering: crisp-edges;
            left: -0.1%; 
            top: -0.1%;
            will-change: transform;
        }
    </style>
</head>
<body>

    <div id="mask">
        <div id="sprite-layer"></div>
    </div>

    <script>
        const layer = document.getElementById('sprite-layer');
        const TOTAL_FRAMES = 39;
        const COLS = 7;

        /* FUNCION MAESTRA PARA MOVER */
        function actualizarGabi(clientX) {
            const percent = clientX / window.innerWidth;
            const frameIndex = Math.floor(percent * (TOTAL_FRAMES - 1));
            
            const col = frameIndex % COLS;
            const row = Math.floor(frameIndex / COLS);
            
            // Usamos porcentajes para que funcione en cualquier tamaño de pantalla
            const x = col * (100 / COLS);
            const y = row * (100 / 6); // 6 filas totales
            
            layer.style.transform = `translate(-${x}%, -${y}%)`;
        }

        /* CUANDO MOVER MANO CON RATON */
        window.addEventListener('mousemove', (e) => {
            actualizarGabi(e.clientX);
        });

        /* CUANDO MOVER DEDO EN EL CELU */

            actualizarGabi(e.touches[0].clientX);
