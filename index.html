    <style>
        /* CUEVA OSCURA */
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #000;
            display: flex; justify-content: center; align-items: center;
        }

        /* HUECO PARA MIRAR DIBUJO */
        #mask {
            /* RECORTE: Le sacamos 2px para que la linea blanca quede afuera */
            width: 1048px; 
            height: 640px; 
            overflow: hidden;
            position: relative;
            border: 2px solid #111;
            background-color: #000;
        }

        /* DIBUJO QUE SE MUEVE ATRAS */
        #sprite-layer {
            position: absolute;
            background-image: url('https://i.imgur.com/GN17nyJ.jpeg');
            background-repeat: no-repeat;
            
            /* TAMAÑO DE TODA LA PORQUERÍA (X3) */
            background-size: 7350px 3852px; 
            width: 7350px;
            height: 3852px;
            
            image-rendering: crisp-edges;
            
            /* EMPUJE: Metemos el dibujo 1px adentro de la mascara */
            left: -1px; 
            top: -1px;
            will-change: transform;
        }
    </style>
</head>

    <div id="mask">
        <div id="sprite-layer"></div>
    </div>

        const TOTAL_FRAMES = 39;
        /* FILAS */
        const COLS = 7;
        /* MEDIDAS */
        const FW = 1050; 
        const FH = 642; 

        /* CUANDO MOVER MANO CON RATON */
        window.addEventListener('mousemove', (e) => {
            const percent = e.clientX / window.innerWidth;
            const frameIndex = Math.floor(percent * (TOTAL_FRAMES - 1));
            
            const col = frameIndex % COLS;
            const row = Math.floor(frameIndex / COLS);
            
            const x = col * FW;
            const y = row * FH;
            
            /* MOVER PARA QUE NO SE VEA MUESCA FEA DE ABAJO */
